services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ephemeral
      POSTGRES_PASSWORD: ephemeral
      POSTGRES_DB: ephemeral
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  backend:
    build:
      context: ./backend
    environment:
      PORT: "8080"
      POSTGRES_HOST: "postgres"
      REDIS_ADDR: "redis:6379"
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis

volumes:
  pgdata:
  redisdata:
